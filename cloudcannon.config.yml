collections_config:
  vendors:
    path: _vendors
    output: true
    name: Vendors
    singular_name: Vendor
    icon: storefront
  weddings:
    path: _weddings
    output: true
    name: Real Weddings
    singular_name: Wedding
    icon: favorite
  listing_categories:
    path: _listing_categories
    output: true
    name: Categories
    singular_name: Category
    icon: category
  locations:
    path: _locations
    output: true
    name: Locations
    singular_name: Location
    icon: location_on
  posts:
    path: _posts
    output: true
    name: Blog Posts
    singular_name: Blog Post
    icon: article

data_config:
  nav:
    path: _data/nav.yml
  site:
    path: _data/site.yml

_inputs:
  title:
    type: text
  hero_image:
    type: image
  gallery:
    type: array
  featured:
    type: switch
  category_slug:
    type: select
    options:
      values: collections.listing_categories
      value_key: slug
      label_key: name
  cities:
    type: multiselect
    options:
      values: collections.locations
      value_key: slug
      label_key: name
