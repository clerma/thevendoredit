---
layout: default
---

<!-- Page hero -->
<section style="background:var(--tve-bg);padding:90px 0 60px;border-bottom:1px solid var(--tve-rule);">
  <div class="container-fluid px-4 px-lg-5">
    {% if page.subtitle %}<div class="tve-eyebrow mb-3" style="color:var(--tve-accent);">{{ page.subtitle }}</div>{% endif %}
    <h1 style="font-family:var(--tve-serif);font-weight:400;font-size:clamp(40px,6vw,80px);line-height:.95;letter-spacing:-.015em;margin:0;">{{ page.title }}</h1>
  </div>
</section>

<!-- Page content -->
<section style="padding:60px 0 100px;background:var(--tve-bg);">
  <div class="container-fluid px-4 px-lg-5">
    <div style="max-width:760px;font-family:var(--tve-sans);font-size:16px;line-height:1.75;color:var(--tve-ink);">
      {{ content }}
    </div>
  </div>
</section>
