---
layout: default
---

<!-- Header Banner -->
<div class="banner-header section-padding valign bg-img bg-fixed" data-overlay-dark="4"
  data-background="{{ page.hero_image | default: '/assets/img/Unknown-3.avif' }}">
  <div class="container">
    <div class="row">
      <div class="col-md-12 text-center">
        <h5>Get Inspired</h5>
        <h1>{{ page.title | default: 'Real Weddings' }}</h1>
      </div>
    </div>
  </div>
</div>

<!-- Weddings Grid -->
<section class="section-padding">
  <div class="container">

    <!-- Style Filter -->
    <div class="row mb-40">
      <div class="col-md-12 text-center">
        <div class="filter-bar">
          <a href="{{ '/weddings/' | relative_url }}" class="filter-btn active">All</a>
          <a href="#" class="filter-btn">Romantic</a>
          <a href="#" class="filter-btn">Boho</a>
          <a href="#" class="filter-btn">Classic</a>
          <a href="#" class="filter-btn">Outdoor</a>
          <a href="#" class="filter-btn">Modern</a>
          <a href="#" class="filter-btn">Garden</a>
        </div>
      </div>
    </div>

    <div class="row">
      {% assign real_weddings = site.categories["real-weddings"] %}
      {% for wedding in real_weddings %}
      <div class="col-lg-4 col-md-6 mb-30 animate-box" data-animate-effect="fadeInUp">
        {% include wedding-card.html wedding=wedding %}
      </div>
      {% endfor %}
    </div>

  </div>
</section>
