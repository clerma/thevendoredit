title: The Event Edit
description: A curated wedding vendor directory for Lafayette and Acadiana, Louisiana.
url: "https://thevendoredit.com"
baseurl: ""
lang: en_us
timezone: America/Chicago

# Collections
collections:
  vendors:
    output: true
    permalink: /vendors/:slug/
  weddings:
    output: true
    permalink: /weddings/:slug/
  categories:
    output: true
    permalink: /:slug/
  locations:
    output: true
    permalink: /locations/:slug/

# Defaults
defaults:
  - scope:
      path: ""
      type: "vendors"
    values:
      layout: "vendor"
  - scope:
      path: ""
      type: "weddings"
    values:
      layout: "wedding"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "categories"
    values:
      layout: "category"
  - scope:
      path: ""
      type: "locations"
    values:
      layout: "location"
  - scope:
      path: "_pages"
    values:
      layout: "page"

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

# Build settings
markdown: kramdown
permalink: /blog/:slug/

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - cappa
  - README.md
