# netlify.toml
# Next.js app with Clerk auth — deployed via @netlify/plugin-nextjs.
# CloudCannon still edits _vendors/ and _data/ content files in this repo.
#
# Required environment variables in Netlify dashboard:
#   NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
#   CLERK_SECRET_KEY
#   GITHUB_TOKEN              GitHub PAT (repo scope) — webhook writes vendor .md files
#   GITHUB_OWNER              clerma
#   GITHUB_REPO               thevendoredit
#   GITHUB_BRANCH             main
#   CLOUDCANNON_WEBHOOK       CloudCannon build trigger URL

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
