<footer style="padding:60px 0 40px;background:#fff;border-top:1px solid var(--tve-rule);">
  <div class="container-fluid px-4 px-lg-5 d-flex justify-content-between align-items-center flex-wrap gap-3">
    <a href="{{ '/' | relative_url }}" class="tve-wordmark" style="text-decoration:none;">
      <img src="{{ site.data.site.logo_image }}" class="logo-img" alt="{{ site.title }}" style="height:32px;">
    </a>
    <div style="font-family:var(--tve-sans);font-size:12px;color:var(--tve-muted);letter-spacing:.08em;">
      &copy; {{ 'now' | date: "%Y" }} &middot; Lafayette, Louisiana &middot; {{ site.data.site.email }}
    </div>
  </div>
</footer>
