<!-- Memberstack 2.0 — DOM package. We bind data-ms-* clicks ourselves below
     because v2 does not auto-wire data-ms-price:add / data-ms-plan:add the way v1 did. -->
<script src="https://static.memberstack.com/scripts/v2/memberstack.js"
  data-memberstack-app="{{ site.data.site.memberstack_app_id }}"></script>

<!-- Wire data-ms-* triggers to the Memberstack signup/login modals.
     Supported attributes on any <a>/<button>:
       data-ms-price:add="prc_xxx"   -> opens SIGNUP modal pre-attaching that price
       data-ms-plan:add="pln_xxx"    -> opens SIGNUP modal pre-attaching that free plan
       data-ms-modal="signup"        -> opens SIGNUP modal
       data-ms-modal="login"         -> opens LOGIN modal
       data-ms-action="logout"       -> logs the member out -->
<script>
  (function () {
    function ready(fn) {
      if (document.readyState !== 'loading') fn();
      else document.addEventListener('DOMContentLoaded', fn);
    }
    function waitForMs(cb, tries) {
      tries = tries || 0;
      if (window.$memberstackDom) return cb(window.$memberstackDom);
      if (tries > 50) return; /* ~5s */
      setTimeout(function () { waitForMs(cb, tries + 1); }, 100);
    }
    ready(function () {
      waitForMs(function (ms) {
        document.addEventListener('click', function (e) {
          var el = e.target;
          while (el && el.nodeType === 1) {
            if (el.hasAttribute && (
                el.hasAttribute('data-ms-price:add') ||
                el.hasAttribute('data-ms-plan:add') ||
                el.hasAttribute('data-ms-modal') ||
                el.hasAttribute('data-ms-action'))) break;
            el = el.parentNode;
          }
          if (!el || el.nodeType !== 1) return;
          var priceId = el.getAttribute('data-ms-price:add');
          var planId  = el.getAttribute('data-ms-plan:add');
          var modal   = el.getAttribute('data-ms-modal');
          var action  = el.getAttribute('data-ms-action');
          if (priceId) {
            e.preventDefault();
            ms.openModal('SIGNUP', { priceId: priceId });
            return;
          }
          if (planId) {
            e.preventDefault();
            ms.openModal('SIGNUP', { planId: planId });
            return;
          }
          if (modal) {
            e.preventDefault();
            var name = String(modal).toUpperCase();
            if (name === 'SIGNUP' || name === 'LOGIN' || name === 'PROFILE' || name === 'FORGOT_PASSWORD' || name === 'RESET_PASSWORD') {
              ms.openModal(name);
            }
            return;
          }
          if (action === 'logout') {
            e.preventDefault();
            ms.logout().then(function () { window.location.reload(); });
          }
        }, false);
      });
    });
  })();
</script>

<!-- Live-slugify the vendor-slug field inside Memberstack signup modals.
     As the user types, lowercase + strip every char that isn't a-z 0-9 or hyphen. -->
<script>
  (function () {
    function slugify(v) {
      return (v || '')
        .toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '') /* strip diacritics */
        .replace(/[^a-z0-9-]+/g, '');
    }
    document.addEventListener('input', function (e) {
      var t = e.target;
      if (!t || t.tagName !== 'INPUT') return;
      if (t.name !== 'vendor-slug') return;
      var clean = slugify(t.value);
      if (clean !== t.value) {
        var pos = t.selectionStart;
        t.value = clean;
        try { t.setSelectionRange(clean.length, clean.length); } catch (_) {}
        t.dispatchEvent(new Event('input', { bubbles: true }));
      }
    }, true);
  })();
</script>

<!-- Rewrite the vendor-slug field's label/placeholder inside Memberstack modals.
     Label says "Vendor"; placeholder hints at typing the business name (slugify
     above cleans it as the user types). -->
<script>
  (function () {
    var SLUG_LABEL = 'Vendor';
    var SLUG_PLACEHOLDER = 'vendor name';
    function relabel(root) {
      if (!root || !root.querySelectorAll) return;
      var inputs = root.querySelectorAll('input[name="vendor-slug"]');
      inputs.forEach(function (inp) {
        if (inp.placeholder !== SLUG_PLACEHOLDER) inp.placeholder = SLUG_PLACEHOLDER;
      });
      var labels = root.querySelectorAll('label[for="vendor-slug"], label.ms-form__label');
      labels.forEach(function (lbl) {
        var txt = (lbl.textContent || '').trim().toLowerCase();
        if (txt === 'vendor-slug' || txt === 'vendor slug') lbl.textContent = SLUG_LABEL;
      });
    }
    function init() {
      relabel(document);
      var mo = new MutationObserver(function (muts) {
        for (var i = 0; i < muts.length; i++) {
          var m = muts[i];
          for (var j = 0; j < m.addedNodes.length; j++) {
            relabel(m.addedNodes[j]);
          }
        }
      });
      mo.observe(document.body, { childList: true, subtree: true });
    }
    if (document.readyState !== 'loading') init();
    else document.addEventListener('DOMContentLoaded', init);
  })();
</script>
