{% assign vendor = include.vendor %}
<div class="vendor-card">
  <a href="{{ vendor.url | relative_url }}" class="vendor-card-img-link">
    <div class="vendor-card-img position-re o-hidden">
      <img src="{{ vendor.hero_image | default: '/assets/img/placeholder-vendor.jpg' }}"
        alt="{{ vendor.title }}" class="img-fluid">
      <div class="vendor-card-overlay">
        <span class="vendor-card-category">{{ vendor.category }}</span>
        {% if vendor.featured %}
        <span class="vendor-badge">Featured</span>
        {% endif %}
      </div>
    </div>
  </a>
  <div class="vendor-card-body">
    <h5 class="vendor-card-title">
      <a href="{{ vendor.url | relative_url }}">{{ vendor.title }}</a>
    </h5>
    <div class="vendor-card-meta">
      <span class="vendor-city"><i class="ti-location-pin"></i> {{ vendor.city }}</span>
    </div>
    {% if vendor.tagline %}
    <p class="vendor-tagline">{{ vendor.tagline }}</p>
    {% endif %}
  </div>
</div>
