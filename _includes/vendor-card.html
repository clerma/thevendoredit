{% assign vendor = include.vendor %}
<div class="vendor-card">
  <a href="{{ vendor.url | relative_url }}" class="vendor-card-img-link">
    <div class="vendor-card-img position-re o-hidden">
      <img src="{{ vendor.hero_image | default: '/assets/img/Unknown.avif' }}"
        alt="{{ vendor.title }}" class="img-fluid">
      {% if vendor.is_featured and vendor.is_subscribed %}
      <span class="vendor-badge--featured"><i class="ti-star"></i> Featured</span>
      {% endif %}
      <button class="save-btn save-btn--img"
        data-type="vendor"
        data-url="{{ vendor.url | relative_url }}"
        data-title="{{ vendor.title }}"
        data-image="{{ vendor.hero_image | default: '/assets/img/Unknown.avif' }}"
        data-meta="{{ vendor.category }} &middot; {{ vendor.city }}"
        aria-label="Save {{ vendor.title }}">
        <i class="ti-heart"></i>
      </button>
    </div>
  </a>
  <div class="vendor-card-body">
    <div class="vendor-card-cat">{{ vendor.category }} &nbsp;&middot;&nbsp; {{ vendor.city }}</div>
    <h5 class="vendor-card-title">
      <a href="{{ vendor.url | relative_url }}">{{ vendor.title }}</a>
    </h5>
  </div>
</div>
