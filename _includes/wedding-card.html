{% assign wedding = include.wedding %}
<div class="wedding-card">
  <a href="{{ wedding.url | relative_url }}" class="wedding-card-link">
    <div class="wedding-card-img position-re o-hidden">
      <img src="{{ wedding.hero_image | default: '/assets/img/floral.jpg' }}"
        alt="{{ wedding.title }}" class="img-fluid">
      <div class="wedding-card-overlay">
        <div class="wedding-card-info">
          <h5>{{ wedding.title }}</h5>
          {% if wedding.location %}
          <span><i class="ti-location-pin"></i> {{ wedding.location }}</span>
          {% endif %}
        </div>
      </div>
    </div>
    {% if wedding.style_tags and wedding.style_tags.size > 0 %}
    <div class="wedding-card-tags">
      {% for tag in wedding.style_tags limit: 3 %}
      <span class="style-tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </a>
  <button class="save-btn save-btn--card"
    data-type="wedding"
    data-url="{{ wedding.url | relative_url }}"
    data-title="{{ wedding.title }}"
    data-image="{{ wedding.hero_image | default: '/assets/img/floral.jpg' }}"
    data-meta="{{ wedding.location }}"
    aria-label="Save {{ wedding.title }}">
    <i class="ti-heart"></i>
  </button>
</div>
